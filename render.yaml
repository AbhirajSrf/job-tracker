databases:
  - name: job-tracker-db
    plan: free
    databaseName: job_tracker
    user: job_tracker_user

services:
  - type: web
    name: job-tracker-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: "4000"

  - type: web
    name: job-tracker-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
